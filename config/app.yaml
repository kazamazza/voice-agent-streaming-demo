routing:
  min_chunks_for_clarify: 2
  min_chunks_for_llm_fallback: 3

  rules:
    BILLING: ["refund", "charge", "charged", "invoice", "billing", "payment"]
    SUPPORT: ["bug", "error", "not working", "issue", "support", "broken"]
    SALES: ["pricing", "quote", "buy", "purchase", "sales", "upgrade"]

messages:
  clarification:
    en: "Just to clarify so I route you correctly — is this about billing, technical support, or sales?"
  baseline_suggestion:
    en: "I understand — can you confirm your account email and the issue you're seeing?"
  empty_suggestion:
    en: "Could you tell me a bit more about what you need help with?"
  invalid_suggestion_fallback:
    en: "Sorry — could you clarify what you need help with (billing, support, or sales)?"
  coaching_default:
    en: "Consider greeting the customer and confirming the issue clearly."

scoring:
  base_score: 70
  greeting_bonus: 5
  greeting_penalty: 10
  empathy_bonus: 5

semantic:
  enabled: true
  provider: "model"   # "model" | "stub" | "openai_embeddings"
  threshold: 0.78
  model_path: "models/intent_model.joblib"

taxonomy:
  intent_descriptions:
    BILLING: "refunds, charges, invoices, billing, payment problems, card charged twice"
    SUPPORT: "bugs, errors, not working, technical issue, troubleshooting"
    SALES: "pricing, quote, buy, purchase, upgrade plan, subscription"
    HUMAN_AGENT: "complaint, escalation, speak to a person, human agent, manager"